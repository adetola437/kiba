<svg width="430" height="520" viewBox="0 0 430 520" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="430" height="520" fill="#0C3934"/>

  <!-- Depth circles -->
  <circle cx="380" cy="380" r="160" fill="#0A302C" opacity="0.45"/>
  <circle cx="60"  cy="100" r="90"  fill="#0F4540" opacity="0.4"/>

  <!-- Dot grid top-right -->
  <circle cx="356" cy="30" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="378" cy="30" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="400" cy="30" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="356" cy="52" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="378" cy="52" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="400" cy="52" r="3" fill="#FFFFFF" opacity="0.1"/>

  <!-- Dot grid bottom-left -->
  <circle cx="30" cy="470" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="52" cy="470" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="74" cy="470" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="492" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="52" cy="492" r="3" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="74" cy="492" r="3" fill="#FFFFFF" opacity="0.1"/>

  <!-- Phone card mockup -->
  <rect x="70" y="30" width="290" height="420" rx="26" fill="#0A302C" opacity="0.55"/>
  <rect x="70" y="30" width="290" height="420" rx="26" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.12"/>

  <!-- Card header -->
  <text x="215" y="72" font-family="sans-serif" font-size="13" fill="#FFFFFF" opacity="0.55" text-anchor="middle">My Goals</text>

  <!-- Goal 1: Emergency Fund -->
  <rect x="92" y="88" width="246" height="80" rx="12" fill="#FFFFFF" opacity="0.07"/>
  <text x="108" y="112" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.82">Emergency Fund</text>
  <text x="322" y="112" font-family="sans-serif" font-size="11" fill="#C4E0BE" text-anchor="end">₦500k goal</text>
  <rect x="108" y="120" width="210" height="7" rx="3.5" fill="#FFFFFF" opacity="0.1"/>
  <rect x="108" y="120" width="168" height="7" rx="3.5" fill="#C4E0BE"/>
  <text x="108" y="152" font-family="sans-serif" font-size="11" fill="#C4E0BE">80% complete</text>
  <text x="322" y="152" font-family="sans-serif" font-size="11" fill="#FFFFFF" opacity="0.45" text-anchor="end">₦100k left</text>

  <!-- Goal 2: Investment Portfolio -->
  <rect x="92" y="180" width="246" height="80" rx="12" fill="#FFFFFF" opacity="0.07"/>
  <text x="108" y="204" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.82">Investment Portfolio</text>
  <text x="322" y="204" font-family="sans-serif" font-size="11" fill="#F5C8CF" text-anchor="end">₦2M goal</text>
  <rect x="108" y="212" width="210" height="7" rx="3.5" fill="#FFFFFF" opacity="0.1"/>
  <rect x="108" y="212" width="105" height="7" rx="3.5" fill="#F5C8CF"/>
  <text x="108" y="244" font-family="sans-serif" font-size="11" fill="#F5C8CF">50% complete</text>
  <text x="322" y="244" font-family="sans-serif" font-size="11" fill="#FFFFFF" opacity="0.45" text-anchor="end">₦1M left</text>

  <!-- Goal 3: Home Purchase -->
  <rect x="92" y="272" width="246" height="80" rx="12" fill="#FFFFFF" opacity="0.07"/>
  <text x="108" y="296" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.82">Home Purchase</text>
  <text x="322" y="296" font-family="sans-serif" font-size="11" fill="#DEF0F4" text-anchor="end">₦10M goal</text>
  <rect x="108" y="304" width="210" height="7" rx="3.5" fill="#FFFFFF" opacity="0.1"/>
  <rect x="108" y="304" width="63"  height="7" rx="3.5" fill="#DEF0F4"/>
  <text x="108" y="336" font-family="sans-serif" font-size="11" fill="#DEF0F4">30% complete</text>
  <text x="322" y="336" font-family="sans-serif" font-size="11" fill="#FFFFFF" opacity="0.45" text-anchor="end">₦7M left</text>

  <!-- Goal 4: Retirement -->
  <rect x="92" y="364" width="246" height="60" rx="12" fill="#FFFFFF" opacity="0.05"/>
  <rect x="92" y="364" width="246" height="60" rx="12" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.1"/>
  <text x="108" y="390" font-family="sans-serif" font-size="12" fill="#FFFFFF" opacity="0.5">Retirement Fund</text>
  <text x="108" y="410" font-family="sans-serif" font-size="11" fill="#FFFFFF" opacity="0.3">Not started yet</text>
  <rect x="282" y="378" width="40" height="22" rx="11" fill="#C4E0BE" opacity="0.3"/>
  <text x="302" y="393" font-family="sans-serif" font-size="10" fill="#C4E0BE" text-anchor="middle">+ Add</text>

  <!-- Floating badge: goal reached -->
  <rect x="20" y="188" width="136" height="52" rx="12" fill="#C4E0BE"/>
  <text x="88" y="210" font-family="sans-serif" font-size="10" fill="#0C3934" text-anchor="middle" font-weight="600">Goal reached!</text>
  <text x="88" y="230" font-family="sans-serif" font-size="13" font-weight="700" fill="#0C3934" text-anchor="middle">₦400k</text>

  <!-- Floating badge: monthly saved -->
  <rect x="274" y="460" width="136" height="52" rx="12" fill="#F5C8CF"/>
  <text x="342" y="482" font-family="sans-serif" font-size="10" fill="#0C3934" text-anchor="middle" font-weight="600">Monthly saved</text>
  <text x="342" y="502" font-family="sans-serif" font-size="13" font-weight="700" fill="#0C3934" text-anchor="middle">₦45,000</text>
</svg>
