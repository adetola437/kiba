name: kiba
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  flutter_dotenv: ^5.1.0 
  pinput: ^4.0.0
  

  # DI
  get_it: ^7.6.7

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  dartz: ^0.10.1

  # Routing
  go_router: ^13.2.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  flutter_screenutil: ^5.9.0
  responsive_framework: ^1.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  connectivity_plus: ^6.0.3

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  form_validator: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    # ── BW Gradual (headlines only) ──────────────────────────────
    - family: BWGradual
      fonts:
        - asset: assets/fonts/BwGradual/BwGradualDEMO-Thin.otf
          weight: 100
        - asset: assets/fonts/BwGradual/BwGradualDEMO-ThinItalic.otf
          weight: 100
          style: italic
        - asset: assets/fonts/BwGradual/BwGradualDEMO-Light.otf
          weight: 300
        - asset: assets/fonts/BwGradual/BwGradualDEMO-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/BwGradual/BwGradualDEMO-Regular.otf
          weight: 400
        - asset: assets/fonts/BwGradual/BwGradualDEMO-RegularItalic.otf
          weight: 400
          style: italic
        - asset: assets/fonts/BwGradual/BwGradualDEMO-Medium.otf
          weight: 500
        - asset: assets/fonts/BwGradual/BwGradualDEMO-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/BwGradual/BwGradualDEMO-Bold.otf
          weight: 700
        - asset: assets/fonts/BwGradual/BwGradualDEMO-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/BwGradual/BwGradualDEMO-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/BwGradual/BwGradualDEMO-ExtraBoldItalic.otf
          weight: 800
          style: italic
        - asset: assets/fonts/BwGradual/BwGradualDEMO-Black.otf
          weight: 900
        - asset: assets/fonts/BwGradual/BwGradualDEMO-BlackItalic.otf
          weight: 900
          style: italic

    - family: EuclidCircularA
      fonts:
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Light.ttf
          weight: 300
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Light Italic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Regular.ttf
          weight: 400
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Medium.ttf
          weight: 500
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Medium Italic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A SemiBold.ttf
          weight: 600
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A SemiBold Italic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Bold.ttf
          weight: 700
        - asset: assets/fonts/euclid-circular-a/Euclid Circular A Bold Italic.ttf
          weight: 700
          style: italic
